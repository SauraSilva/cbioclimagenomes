<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Genômico | CBioClima</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FF6600; /* Laranja extraído do logotipo */
            --dark-gray: #333333;
            --light-bg: #FFFFFF;
            --page-bg: #F4F7F6;
        }
        body { 
            font-family: 'Open Sans', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background-color: var(--page-bg);
            color: var(--dark-gray);
        }
        /* Barra superior fina em laranja */
        .header-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 4px;
            background-color: var(--primary-orange);
        }
        .card { 
            background: var(--light-bg); 
            padding: 60px 50px; 
            border-radius: 4px; /* Cantos retos, mais corporativo */
            box-shadow: 0 15px 35px rgba(0,0,0,0.04); 
            text-align: center; 
            max-width: 650px;
            border: 1px solid #EEE;
        }
        /* Estilização do logotipo */
        .logo-cbioclima {
            max-width: 250px;
            height: auto;
            margin-bottom: 30px;
        }
        h1 { 
            font-family: 'Montserrat', sans-serif;
            color: var(--dark-gray); 
            font-size: 2em;
            letter-spacing: -1px;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 700;
        }
        p { 
            font-size: 1.1em; 
            line-height: 1.8;
            color: #666;
            margin-bottom: 40px;
            font-weight: 300;
        }
        /* Botão Laranja CBioClima */
        .btn { 
            display: inline-block; 
            background-color: var(--primary-orange); 
            color: white; 
            padding: 18px 45px; 
            text-decoration: none; 
            border-radius: 2px; 
            font-weight: 700; 
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(255,102,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { 
            background-color: #E65C00; /* Laranja um pouco mais escuro no hover */
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(255,102,0,0.3);
        }
        .footer { 
            margin-top: 50px; 
            font-size: 0.8em; 
            color: #BBB;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body>
    <div class="header-bar"></div>
    <div class="card">
        <img src="https://static.wixstatic.com/media/59411b_346294c28d494203a1ca5a9cbf988338~mv2.png/v1/fill/w_301,h_120,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/Marca-Cbio-principal-laranja-sem-fundo-com-legenda-pt.png" 
             alt="CBioClima" class="logo-cbioclima">
        
        <h1>Portal de Dados Genômicos</h1>
        <p>Bem-vindo ao ambiente de exploração genômica do Centro de Biologia Molecular e Clima. Utilize nossa ferramenta para análise de anotações, mapas de sintenia e dados de sequenciamento.</p>
        
        <a href="https://saurasilva.github.io/cbioclimagenomes/?config=config.json" class="btn">INICIAR BROWSER</a>
        
        <div class="footer">
            CBioClima | 2026
        </div>
    </div>
</body>
</html>
